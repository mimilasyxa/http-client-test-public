version: '3.8'
name: ${PROJECT_NAME}
services:
  nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME}_nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./../app:/var/www/html
    depends_on:
      - php
    networks:
      - app-networks

  php:
    container_name: ${PROJECT_NAME}_php
    ports:
      - "${PHP_PORT}:9000"
    volumes:
      - ./../app:/var/www/html
    depends_on:
      - mysql
    environment:
      - PHP_OPCACHE= 1
      - UPLOAD_LIMIT= 64M
    networks:
      - app-networks
    build:
      context: ../
      dockerfile: docker/php/Dockerfile
    entrypoint: /var/www/html/entrypoint.sh

  mysql:
    build:
      context: mysql
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_mysql
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-networks

  redis:
    build:
      context: redis
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}_redis
    command: 'redis-server --requirepass ${REDIS_PASSWORD}'
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-networks

networks:
  app-networks:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
